<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TindahanPOS – Home</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #F07B2F;
    --orange-light: #FDE8D4;
    --orange-mid: #FAC89A;
    --bg: #FAF6F1;
    --card: #FFFFFF;
    --text: #1A1A1A;
    --sub: #888888;
    --border: #F0EAE2;
    --green: #4CAF7D;
    --nav-h: 72px;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { font-family:'Poppins',sans-serif; background:var(--bg); color:var(--text); max-width:430px; margin:0 auto; min-height:100vh; position:relative; overflow-x:hidden; }

  /* TOP BAR */
  .topbar { display:flex; align-items:center; justify-content:space-between; padding:18px 20px 10px; background:var(--card); }
  .topbar-left h2 { font-family:'Nunito',sans-serif; font-size:20px; font-weight:800; }
  .topbar-left p { font-size:12px; color:var(--sub); margin-top:1px; }
  .avatar { width:40px; height:40px; border-radius:50%; background:var(--orange-light); display:flex; align-items:center; justify-content:center; font-size:18px; }

  /* BANNER */
  .banner { margin:14px 16px; background:linear-gradient(135deg,#F07B2F,#E05A10); border-radius:20px; padding:20px; color:#fff; position:relative; overflow:hidden; }
  .banner::after { content:''; position:absolute; right:-20px; top:-20px; width:120px; height:120px; background:rgba(255,255,255,0.1); border-radius:50%; }
  .banner::before { content:''; position:absolute; right:40px; bottom:-30px; width:80px; height:80px; background:rgba(255,255,255,0.08); border-radius:50%; }
  .banner h3 { font-family:'Nunito',sans-serif; font-size:18px; font-weight:800; }
  .banner > p { font-size:12px; opacity:0.85; margin-top:4px; }
  .banner-stats { display:flex; gap:20px; margin-top:14px; }
  .bstat .val { font-size:22px; font-weight:700; font-family:'Nunito',sans-serif; }
  .bstat .lbl { font-size:11px; opacity:0.8; }

  /* BEST PRODUCT BLOCK */
  .best-product { margin-top:14px; background:rgba(255,255,255,0.15); border-radius:12px; padding:10px 14px; display:flex; align-items:center; gap:10px; }
  .best-product .bp-label { font-size:11px; opacity:0.8; }
  .best-product .bp-name { font-size:14px; font-weight:700; }
  .best-product .bp-qty { font-size:11px; opacity:0.85; margin-top:1px; }

  /* QUICK ACTIONS */
  .section-title { font-family:'Nunito',sans-serif; font-size:16px; font-weight:800; padding:16px 20px 8px; }
  .quick-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; padding:0 16px; }
  .qbtn { background:var(--card); border-radius:16px; padding:14px 8px; display:flex; flex-direction:column; align-items:center; gap:6px; box-shadow:0 2px 8px rgba(0,0,0,0.05); cursor:pointer; transition:transform 0.15s; text-decoration:none; color:var(--text); }
  .qbtn:active { transform:scale(0.95); }
  .qbtn .icon { width:42px; height:42px; border-radius:13px; display:flex; align-items:center; justify-content:center; font-size:20px; }
  .qbtn span { font-size:11px; font-weight:600; text-align:center; line-height:1.2; }
  .ic-orange { background:var(--orange-light); }
  .ic-green { background:#E3F7ED; }
  .ic-blue { background:#E3EEFF; }
  .ic-purple { background:#F0E3FF; }

  /* RECENT SALES */
  .sales-list { padding:0 16px; display:flex; flex-direction:column; gap:10px; margin-bottom:100px; }
  .sale-card { background:var(--card); border-radius:16px; padding:14px 16px; display:flex; align-items:center; gap:12px; box-shadow:0 2px 8px rgba(0,0,0,0.04); }
  .sale-icon { width:44px; height:44px; border-radius:13px; background:var(--orange-light); display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
  .sale-info { flex:1; }
  .sale-info h4 { font-size:14px; font-weight:600; }
  .sale-info p { font-size:11px; color:var(--sub); margin-top:2px; }
  .sale-right { text-align:right; }
  .sale-right .amt { font-size:15px; font-weight:700; font-family:'Nunito',sans-serif; color:var(--orange); }
  .badge { font-size:10px; font-weight:600; padding:3px 8px; border-radius:20px; margin-top:4px; display:inline-block; }
  .badge.paid { background:#E3F7ED; color:#2e7d52; }
  .badge.pending { background:#FDE8D4; color:#b85c1a; }

  /* EMPTY STATE */
  .empty-state { text-align:center; padding:40px 20px; color:var(--sub); margin-bottom:100px; }
  .empty-state .empty-icon { font-size:40px; margin-bottom:12px; }
  .empty-state p { font-size:13px; line-height:1.6; }

  /* BOTTOM NAV */
  .bottom-nav { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:430px; background:#fff; border-top:1px solid var(--border); display:flex; align-items:center; height:var(--nav-h); padding:0 10px; z-index:100; box-shadow:0 -4px 20px rgba(0,0,0,0.06); }
  .nav-item { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; text-decoration:none; color:var(--sub); padding:8px 0; cursor:pointer; }
  .nav-item .nav-icon { font-size:22px; transition:transform 0.2s; }
  .nav-item span { font-size:10px; font-weight:600; }
  .nav-item.active { color:var(--orange); }
  .nav-item.active .nav-icon { transform:scale(1.1); }
  .nav-pos { flex:0 0 68px; display:flex; align-items:center; justify-content:center; }
  .nav-pos-btn { width:54px; height:54px; border-radius:50%; background:var(--orange); display:flex; align-items:center; justify-content:center; font-size:24px; box-shadow:0 4px 16px rgba(240,123,47,0.5); text-decoration:none; transition:transform 0.15s; }
  .nav-pos-btn:active { transform:scale(0.93); }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-left">
    <h2 id="greeting">Magandang Umaga 👋</h2>
    <p id="today-date">...</p>
  </div>
  <div class="avatar">👤</div>
</div>

<!-- BANNER -->
<div class="banner">
  <h3>Today's Summary</h3>
  <p>Tuloy lang ang tinda!</p>
  <div class="banner-stats">
    <div class="bstat"><div class="val" id="stat-revenue">₱0.00</div><div class="lbl">Revenue</div></div>
    <div class="bstat"><div class="val" id="stat-sales">0</div><div class="lbl">Sales</div></div>
    <div class="bstat"><div class="val" id="stat-avg">₱0.00</div><div class="lbl">Avg. Order</div></div>
  </div>
  <div class="best-product" id="best-product-block" style="display:none;">
    <div style="font-size:24px;">⭐</div>
    <div>
      <div class="bp-label">Best-selling product</div>
      <div class="bp-name" id="best-name">—</div>
      <div class="bp-qty" id="best-qty">0 sold today</div>
    </div>
  </div>
</div>

<!-- QUICK ACTIONS -->
<div class="section-title">Quick Actions</div>
<div class="quick-grid">
  <a href="pos.html" class="qbtn">
    <div class="icon ic-orange">🛒</div>
    <span>Magbenta</span>
  </a>
  <a href="products.html" class="qbtn">
    <div class="icon ic-green">🏪</div>
    <span>Produkto</span>
  </a>
  <a href="inventory.html" class="qbtn">
    <div class="icon ic-blue">📦</div>
    <span>Inventory</span>
  </a>
  <a href="profile.html" class="qbtn">
    <div class="icon ic-purple">👤</div>
    <span>Profile</span>
  </a>
</div>

<!-- RECENT SALES -->
<div class="section-title">Recent Sales</div>
<div id="sales-container"></div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <a href="index.html" class="nav-item active">
    <div class="nav-icon">🏠</div>
    <span>Home</span>
  </a>
  <a href="pos.html" class="nav-item">
    <div class="nav-icon">🧾</div>
    <span>Transaction</span>
  </a>
  <div class="nav-pos">
    <a href="pos.html" class="nav-pos-btn">🛒</a>
  </div>
  <a href="inventory.html" class="nav-item">
    <div class="nav-icon">📦</div>
    <span>Inventory</span>
  </a>
  <a href="profile.html" class="nav-item">
    <div class="nav-icon">👤</div>
    <span>Profile</span>
  </a>
</nav>

<script>
  const ICONS = ['🍟','🧃','🍜','🧴','🍬','🌾','🥤','🍦','🛍️','🧁'];

  function getTodayStr() {
    return new Date().toISOString().slice(0, 10);
  }

  function formatPeso(n) {
    return '₱' + Number(n).toLocaleString('en-PH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function setGreeting() {
    const h = new Date().getHours();
    const greet = h < 12 ? 'Magandang Umaga' : h < 18 ? 'Magandang Tanghali' : 'Magandang Gabi';
    document.getElementById('greeting').textContent = greet + ' 👋';

    const days = ['Linggo','Lunes','Martes','Miyerkules','Huwebes','Biyernes','Sabado'];
    const months = ['Enero','Pebrero','Marso','Abril','Mayo','Hunyo','Hulyo','Agosto','Setyembre','Oktubre','Nobyembre','Disyembre'];
    const now = new Date();
    document.getElementById('today-date').textContent =
      days[now.getDay()] + ', ' + months[now.getMonth()] + ' ' + now.getDate() + ', ' + now.getFullYear();
  }

  function loadSales() {
    try {
      const raw = localStorage.getItem('tindahan_sales') || localStorage.getItem('sales') || '[]';
      const parsed = JSON.parse(raw);
      return Array.isArray(parsed) ? parsed : [];
    } catch(e) { return []; }
  }

  function render() {
    const today = getTodayStr();
    const all = loadSales();

    const todaySales = all.filter(s => {
      const d = s.date || s.createdAt || s.timestamp || '';
      return d.startsWith(today);
    });

    // Stats
    const totalRevenue = todaySales.reduce((sum, s) => sum + (parseFloat(s.total) || parseFloat(s.amount) || 0), 0);
    const count = todaySales.length;
    const avg = count ? totalRevenue / count : 0;

    document.getElementById('stat-revenue').textContent = formatPeso(totalRevenue);
    document.getElementById('stat-sales').textContent = count;
    document.getElementById('stat-avg').textContent = formatPeso(avg);

    // Best-selling product
    const productQty = {};
    todaySales.forEach(sale => {
      const items = sale.items || sale.products || [];
      items.forEach(item => {
        const name = item.name || item.productName || 'Unknown';
        const qty = parseFloat(item.qty || item.quantity || 1);
        productQty[name] = (productQty[name] || 0) + qty;
      });
    });

    const bestEntry = Object.entries(productQty).sort((a, b) => b[1] - a[1])[0];
    const block = document.getElementById('best-product-block');
    if (bestEntry) {
      block.style.display = 'flex';
      document.getElementById('best-name').textContent = bestEntry[0];
      document.getElementById('best-qty').textContent = bestEntry[1] + ' sold today';
    } else {
      block.style.display = 'none';
    }

    // Recent sales list
    const container = document.getElementById('sales-container');
    if (todaySales.length === 0) {
      container.innerHTML = '<div class="empty-state"><div class="empty-icon">🧾</div><p>Wala pang benta ngayon.<br>I-tap ang 🛒 para magsimula!</p></div>';
      return;
    }

    const sorted = [...todaySales].reverse().slice(0, 10);
    const cards = sorted.map((s, i) => {
      const icon = ICONS[i % ICONS.length];
      const id = s.id || s.saleId || (todaySales.length - i);
      const total = parseFloat(s.total) || parseFloat(s.amount) || 0;
      const itemCount = (s.items || s.products || []).length;
      const rawDate = s.date || s.createdAt || s.timestamp || '';
      let timeStr = '';
      if (rawDate) {
        try {
          const dt = new Date(rawDate);
          timeStr = ' · ' + dt.toLocaleTimeString('en-PH', { hour: '2-digit', minute: '2-digit' });
        } catch(e) {}
      }
      const status = (s.status || '').toLowerCase();
      const isPaid = status !== 'utang' && status !== 'pending' && status !== 'nakautang';
      const badge = isPaid
        ? '<div class="badge paid">Bayad</div>'
        : '<div class="badge pending">Nakautang</div>';

      return `<div class="sale-card">
        <div class="sale-icon">${icon}</div>
        <div class="sale-info">
          <h4>Benta #${id}</h4>
          <p>${itemCount} aytem${timeStr}</p>
        </div>
        <div class="sale-right">
          <div class="amt">${formatPeso(total)}</div>
          ${badge}
        </div>
      </div>`;
    }).join('');

    container.innerHTML = '<div class="sales-list">' + cards + '</div>';
  }

  setGreeting();
  render();

  // Live update when another tab saves a sale
  window.addEventListener('storage', e => {
    if (e.key === 'tindahan_sales' || e.key === 'sales') render();
  });

  // Fallback poll every 5 seconds
  setInterval(render, 5000);
</script>

</body>
</html>
