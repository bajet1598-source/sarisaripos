<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FoodPOS – Products</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #F07B2F;
    --orange-light: #FDE8D4;
    --bg: #FAF6F1;
    --card: #FFFFFF;
    --text: #1A1A1A;
    --sub: #888888;
    --border: #F0EAE2;
    --green: #4CAF7D;
    --red: #FF5252;
    --nav-h: 72px;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { font-family:'Poppins',sans-serif; background:var(--bg); color:var(--text); max-width:430px; margin:0 auto; min-height:100vh; overflow-x:hidden; }

  .header { display:flex; align-items:center; justify-content:space-between; padding:18px 20px 12px; background:var(--card); }
  .header-left { display:flex; align-items:center; gap:10px; }
  .header-left a { font-size:20px; text-decoration:none; color:var(--text); }
  .header h2 { font-family:'Nunito',sans-serif; font-size:20px; font-weight:800; }
  .add-btn { background:var(--orange); color:#fff; border:none; border-radius:20px; padding:8px 16px; font-size:13px; font-weight:600; cursor:pointer; font-family:'Poppins',sans-serif; }

  .search-wrap { padding:12px 16px; background:var(--card); border-bottom:1px solid var(--border); display:flex; gap:10px; }
  .search-box { flex:1; display:flex; align-items:center; gap:8px; background:var(--bg); border-radius:12px; padding:10px 14px; }
  .search-box input { border:none; background:none; outline:none; font-size:14px; font-family:'Poppins',sans-serif; width:100%; }
  .search-box input::placeholder { color:var(--sub); }

  .stats-row { display:flex; gap:10px; padding:14px 16px; }
  .stat-card { flex:1; background:var(--card); border-radius:14px; padding:12px 14px; box-shadow:0 2px 8px rgba(0,0,0,0.04); }
  .stat-card .val { font-size:22px; font-weight:800; font-family:'Nunito',sans-serif; color:var(--orange); }
  .stat-card .lbl { font-size:11px; color:var(--sub); margin-top:2px; font-weight:600; }

  .section-title { font-family:'Nunito',sans-serif; font-size:16px; font-weight:800; padding:4px 20px 10px; display:flex; align-items:center; justify-content:space-between; }
  .section-title span { font-size:12px; color:var(--sub); font-weight:600; font-family:'Poppins',sans-serif; }

  .cats { display:flex; gap:8px; padding:0 16px 12px; overflow-x:auto; scrollbar-width:none; }
  .cats::-webkit-scrollbar { display:none; }
  .cat { flex-shrink:0; padding:7px 16px; border-radius:20px; border:1.5px solid var(--border); font-size:13px; font-weight:600; cursor:pointer; background:var(--card); color:var(--sub); }
  .cat.active { background:var(--orange); color:#fff; border-color:var(--orange); }

  .prod-list { padding:0 16px; display:flex; flex-direction:column; gap:10px; margin-bottom:90px; }
  .prod-item { background:var(--card); border-radius:16px; padding:14px; display:flex; align-items:center; gap:12px; box-shadow:0 2px 8px rgba(0,0,0,0.04); }
  .prod-emoji { width:54px; height:54px; border-radius:14px; background:var(--bg); display:flex; align-items:center; justify-content:center; font-size:28px; flex-shrink:0; }
  .prod-details { flex:1; }
  .prod-details h4 { font-size:14px; font-weight:700; }
  .prod-details p { font-size:12px; color:var(--sub); margin-top:2px; }
  .prod-details .cat-badge { font-size:10px; background:var(--orange-light); color:var(--orange); padding:2px 8px; border-radius:10px; font-weight:600; margin-top:4px; display:inline-block; }
  .prod-right { text-align:right; }
  .prod-right .price { font-size:16px; font-weight:800; font-family:'Nunito',sans-serif; color:var(--orange); }
  .prod-right .stock { font-size:11px; color:var(--sub); margin-top:2px; }
  .prod-actions { display:flex; gap:6px; margin-top:6px; justify-content:flex-end; }
  .action-btn { width:28px; height:28px; border-radius:8px; border:none; cursor:pointer; font-size:14px; display:flex; align-items:center; justify-content:center; }
  .edit-btn { background:#E3EEFF; }
  .del-btn { background:#FFE8E8; }

  /* ADD PRODUCT MODAL */
  .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.35); z-index:200; }
  .overlay.open { display:block; }
  .modal { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:430px; background:#fff; border-radius:24px 24px 0 0; padding:20px; z-index:201; }
  .modal-handle { width:40px; height:4px; background:var(--border); border-radius:4px; margin:0 auto 16px; }
  .modal h3 { font-family:'Nunito',sans-serif; font-size:18px; font-weight:800; margin-bottom:16px; }
  .form-group { margin-bottom:14px; }
  .form-group label { font-size:12px; font-weight:600; color:var(--sub); display:block; margin-bottom:6px; }
  .form-group input, .form-group select { width:100%; background:var(--bg); border:1.5px solid var(--border); border-radius:12px; padding:11px 14px; font-size:14px; font-family:'Poppins',sans-serif; outline:none; color:var(--text); }
  .form-group input:focus, .form-group select:focus { border-color:var(--orange); }
  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .save-btn { width:100%; background:var(--orange); color:#fff; border:none; border-radius:16px; padding:15px; font-size:15px; font-weight:700; cursor:pointer; font-family:'Poppins',sans-serif; margin-top:4px; }

  .bottom-nav { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:430px; background:#fff; border-top:1px solid var(--border); display:flex; align-items:center; height:var(--nav-h); padding:0 10px; z-index:100; box-shadow:0 -4px 20px rgba(0,0,0,0.06); }
  .nav-item { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; text-decoration:none; color:var(--sub); padding:8px 0; }
  .nav-item .nav-icon { font-size:22px; }
  .nav-item span { font-size:10px; font-weight:600; }
  .nav-item.active { color:var(--orange); }
  .nav-pos { flex:0 0 68px; display:flex; align-items:center; justify-content:center; }
  .nav-pos-btn { width:54px; height:54px; border-radius:50%; background:var(--orange); display:flex; align-items:center; justify-content:center; font-size:24px; box-shadow:0 4px 16px rgba(240,123,47,0.5); text-decoration:none; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <a href="home.html">←</a>
    <h2>Products</h2>
  </div>
  <button class="add-btn" onclick="openModal()">+ Add</button>
</div>

<div class="search-wrap">
  <div class="search-box">
    <span>🔍</span>
    <input type="text" placeholder="Search products..." id="searchInput" oninput="renderList()">
  </div>
</div>

<div class="stats-row">
  <div class="stat-card"><div class="val" id="totalCount">8</div><div class="lbl">Total Products</div></div>
  <div class="stat-card"><div class="val">5</div><div class="lbl">Categories</div></div>
  <div class="stat-card"><div class="val" style="color:#4CAF7D">All</div><div class="lbl">In Stock</div></div>
</div>

<div class="section-title">All Products <span id="countLabel">8 items</span></div>

<div class="cats">
  <div class="cat active" onclick="filterCat(this,'all')">All</div>
  <div class="cat" onclick="filterCat(this,'snacks')">Snacks</div>
  <div class="cat" onclick="filterCat(this,'grill')">Grill</div>
  <div class="cat" onclick="filterCat(this,'burger')">Burger</div>
  <div class="cat" onclick="filterCat(this,'shakes')">Shakes</div>
  <div class="cat" onclick="filterCat(this,'fruits')">Fruits</div>
  <div class="cat" onclick="filterCat(this,'salad')">Salad</div>
</div>

<div class="prod-list" id="prodList"></div>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="closeModal()"></div>
<div class="modal" id="modal" style="display:none">
  <div class="modal-handle"></div>
  <h3 id="modalTitle">Add New Product</h3>
  <div class="form-group">
    <label>PRODUCT NAME</label>
    <input type="text" id="pName" placeholder="e.g. Beef Burger">
  </div>
  <div class="form-row">
    <div class="form-group">
      <label>PRICE ($)</label>
      <input type="number" id="pPrice" placeholder="0.00" step="0.01">
    </div>
    <div class="form-group">
      <label>STOCK</label>
      <input type="number" id="pStock" placeholder="0">
    </div>
  </div>
  <div class="form-row">
    <div class="form-group">
      <label>CATEGORY</label>
      <select id="pCat">
        <option value="snacks">Snacks</option>
        <option value="grill">Grill</option>
        <option value="burger">Burger</option>
        <option value="shakes">Shakes</option>
        <option value="fruits">Fruits</option>
        <option value="salad">Salad</option>
      </select>
    </div>
    <div class="form-group">
      <label>EMOJI</label>
      <input type="text" id="pEmoji" placeholder="🍔" maxlength="2">
    </div>
  </div>
  <button class="save-btn" onclick="saveProduct()">Save Product</button>
</div>

<nav class="bottom-nav">
  <a href="home.html" class="nav-item">
    <div class="nav-icon">🏠</div><span>Home</span>
  </a>
  <a href="pos.html" class="nav-item">
    <div class="nav-icon">🧾</div><span>Transaction</span>
  </a>
  <div class="nav-pos"><a href="pos.html" class="nav-pos-btn">🛒</a></div>
  <a href="inventory.html" class="nav-item">
    <div class="nav-icon">📦</div><span>Inventory</span>
  </a>
  <a href="profile.html" class="nav-item">
    <div class="nav-icon">👤</div><span>Profile</span>
  </a>
</nav>

<script>
let products = [
  { id:1, name:'Tasty Snacks', price:7.50, emoji:'🍿', cat:'snacks', stock:50 },
  { id:2, name:'Fish and Chips', price:12.50, emoji:'🐟', cat:'grill', stock:30 },
  { id:3, name:'Grilled Salmon', price:7.50, emoji:'🥩', cat:'grill', stock:20 },
  { id:4, name:'Beef Fajitas', price:7.50, emoji:'🌮', cat:'grill', stock:25 },
  { id:5, name:'Classic Burger', price:9.00, emoji:'🍔', cat:'burger', stock:40 },
  { id:6, name:'Chicken Shake', price:6.00, emoji:'🥤', cat:'shakes', stock:60 },
  { id:7, name:'Fruit Salad', price:5.50, emoji:'🍓', cat:'fruits', stock:35 },
  { id:8, name:'Caesar Salad', price:8.00, emoji:'🥗', cat:'salad', stock:28 },
];
let currentCat = 'all';
let editId = null;

function filterCat(el, cat) {
  document.querySelectorAll('.cat').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  currentCat = cat;
  renderList();
}

function renderList() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = products.filter(p => {
    return (currentCat==='all'||p.cat===currentCat) && p.name.toLowerCase().includes(q);
  });
  document.getElementById('countLabel').textContent = filtered.length + ' items';
  document.getElementById('totalCount').textContent = products.length;
  document.getElementById('prodList').innerHTML = filtered.map(p=>`
    <div class="prod-item">
      <div class="prod-emoji">${p.emoji}</div>
      <div class="prod-details">
        <h4>${p.name}</h4>
        <p>Stock: ${p.stock} units</p>
        <span class="cat-badge">${p.cat}</span>
      </div>
      <div class="prod-right">
        <div class="price">$${p.price.toFixed(2)}</div>
        <div class="prod-actions">
          <button class="action-btn edit-btn" onclick="editProduct(${p.id})">✏️</button>
          <button class="action-btn del-btn" onclick="deleteProduct(${p.id})">🗑️</button>
        </div>
      </div>
    </div>`).join('');
}

function openModal(reset=true) {
  if(reset) {
    editId=null;
    document.getElementById('modalTitle').textContent='Add New Product';
    document.getElementById('pName').value='';
    document.getElementById('pPrice').value='';
    document.getElementById('pStock').value='';
    document.getElementById('pEmoji').value='';
  }
  document.getElementById('overlay').classList.add('open');
  document.getElementById('modal').style.display='block';
}
function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('modal').style.display='none';
}
function editProduct(id) {
  const p = products.find(x=>x.id===id);
  editId=id;
  document.getElementById('modalTitle').textContent='Edit Product';
  document.getElementById('pName').value=p.name;
  document.getElementById('pPrice').value=p.price;
  document.getElementById('pStock').value=p.stock;
  document.getElementById('pEmoji').value=p.emoji;
  document.getElementById('pCat').value=p.cat;
  openModal(false);
}
function deleteProduct(id) {
  if(confirm('Delete this product?')) {
    products = products.filter(p=>p.id!==id);
    renderList();
  }
}
function saveProduct() {
  const name=document.getElementById('pName').value.trim();
  const price=parseFloat(document.getElementById('pPrice').value);
  const stock=parseInt(document.getElementById('pStock').value)||0;
  const cat=document.getElementById('pCat').value;
  const emoji=document.getElementById('pEmoji').value||'🍽️';
  if(!name||isNaN(price)) { alert('Please fill in name and price.'); return; }
  if(editId) {
    const p=products.find(x=>x.id===editId);
    Object.assign(p,{name,price,stock,cat,emoji});
  } else {
    products.push({id:Date.now(),name,price,stock,cat,emoji});
  }
  closeModal();
  renderList();
}

renderList();
</script>
</body>
</html>
